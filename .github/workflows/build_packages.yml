name: Build Packages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_linux_x86_64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build manylinux wheels
        run: python build_tools/build_linux_packages.py --docker docker

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: wheelhouse/*.whl

  build_windows_x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install build deps
        run: pip install scikit-build-core nanobind numpy ninja

      - name: Clone IREE
        run: |
          $IREE_VERSION = python -c "import json; print(json.load(open('version.json'))['iree-version'])"
          if ($IREE_VERSION -notmatch '^[a-zA-Z0-9._-]+$') {
            Write-Error "Invalid IREE version: $IREE_VERSION"; exit 1
          }
          git init C:\iree
          git -C C:\iree remote add origin https://github.com/iree-org/iree.git
          git -C C:\iree fetch --depth 1 origin "$IREE_VERSION"
          git -C C:\iree checkout FETCH_HEAD
          git -C C:\iree submodule update --init --depth 1 third_party/flatcc third_party/benchmark

      - name: Build wheel
        run: pip wheel --no-deps -v -w wheelhouse --config-settings=build-dir=C:/b .
        env:
          IREE_SOURCE_DIR: C:\iree
          CMAKE_GENERATOR: Ninja

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: wheelhouse/*.whl

  test_wheels:
    needs: [build_linux_x86_64, build_windows_x86_64]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            python-version: "3.10"
            artifact: wheels-linux-x86_64
          - os: ubuntu-24.04
            python-version: "3.11"
            artifact: wheels-linux-x86_64
          - os: ubuntu-24.04
            python-version: "3.12"
            artifact: wheels-linux-x86_64
          - os: ubuntu-24.04
            python-version: "3.13"
            artifact: wheels-linux-x86_64
          - os: ubuntu-24.04
            python-version: "3.14"
            artifact: wheels-linux-x86_64
          - os: windows-latest
            python-version: "3.12"
            artifact: wheels-windows-x86_64
          - os: windows-latest
            python-version: "3.13"
            artifact: wheels-windows-x86_64
          - os: windows-latest
            python-version: "3.14"
            artifact: wheels-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: wheelhouse/

      - name: Install wheel
        shell: bash
        run: |
          # Try version-specific wheel first (cp310, cp311), then abi3.
          PYVER="cp$(echo ${{ matrix.python-version }} | tr -d '.')"
          WHEEL=$(ls wheelhouse/iree_tokenizer-*-${PYVER}-${PYVER}-*.whl 2>/dev/null | head -1 || true)
          if [ -z "$WHEEL" ]; then
            WHEEL=$(ls wheelhouse/iree_tokenizer-*-*-abi3-*.whl 2>/dev/null | head -1 || true)
          fi
          if [ -z "$WHEEL" ]; then
            echo "No wheel found for ${PYVER}, listing available:"
            ls wheelhouse/
            exit 1
          fi
          echo "Installing: ${WHEEL}"
          pip install "${WHEEL}"

      - name: Install test deps
        run: pip install pytest numpy

      - name: Run tests
        run: pytest tests/ -v
